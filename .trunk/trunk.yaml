version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.2.1
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - oxipng@7.0.0
    - shfmt@3.6.0
    - checkov@3.2.504
    - osv-scanner@1.3.6
    - trivy@0.37.1
    - trufflehog@3.31.3
    - markdownlint@0.47.0
    - dotenv-linter@3.3.0
    - eslint@10.0.0
    - git-diff-check
    - gitleaks@8.16.2
    - prettier@3.8.1
    - shellcheck@0.9.0
    - yamllint@1.38.0
runtimes:
  enabled:
    - go@1.19.5
    - node@18.12.1
    - python@3.10.8
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
