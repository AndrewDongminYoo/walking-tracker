version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.4
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - ktlint@1.8.0
    - swiftlint@0.63.2
    - oxipng@10.1.0
    - shfmt@3.6.0
    - checkov@3.2.505
    - osv-scanner@2.3.3
    - trivy@0.69.1
    - trufflehog@3.93.4
    - markdownlint@0.47.0
    - dotenv-linter@4.0.0
    - eslint@10.0.0
    - git-diff-check
    - gitleaks@8.29.0
    - prettier@3.8.1
    - shellcheck@0.11.0
    - yamllint@1.38.0
runtimes:
  enabled:
    - java@13.0.11
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
